<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMT-1 訓練平台</title>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <link rel="stylesheet" href="./assets/css/style.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { medical: { blue: '#1e3a8a', red: '#dc2626', light: '#f8fafc' } } } }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans antialiased h-[100dvh] overflow-hidden flex flex-col transition-colors duration-500 relative">

  <div class="fixed inset-0 bg-medical-pattern pointer-events-none z-0"></div>

  <i class="fa-solid fa-star-of-life floating-element float-1"></i>
  <i class="fa-solid fa-plus floating-element float-2"></i>
  <i class="fa-solid fa-heart-pulse floating-element float-3"></i>
  <i class="fa-solid fa-star-of-life floating-element float-4"></i>
  <i class="fa-solid fa-plus floating-element float-5"></i>
  <i class="fa-solid fa-kit-medical floating-element float-6"></i>

  <div class="h-1.5 w-full ecg-scanner shrink-0 z-[70] fixed top-0 left-0"></div>

  <div id="app" class="w-full h-full flex flex-col min-h-0 relative z-10 pt-1.5">
    
    <transition name="fade-slide">
      <div v-if="toast.visible" :class="['fixed top-24 md:top-28 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-4 rounded-2xl shadow-2xl font-bold flex items-center gap-3 border-2 transition-all duration-300 backdrop-blur-md', toast.type === 'error' ? 'bg-red-50/95 dark:bg-red-900/95 text-red-600 dark:text-red-300 border-red-200 dark:border-red-700' : 'bg-green-50/95 dark:bg-green-900/95 text-green-600 dark:text-green-300 border-green-200 dark:border-green-700']">
        <i :class="['fa-solid', toast.type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check', 'text-xl']"></i>
        <span class="text-sm md:text-base whitespace-nowrap">{{ toast.message }}</span>
      </div>
    </transition>

    <header class="shrink-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl shadow-sm border-b border-slate-200 dark:border-slate-800 px-4 py-3 md:px-8 md:py-4 transition-colors z-50 flex items-center justify-between">
      
      <div class="flex items-center gap-2 md:gap-3 text-medical-blue dark:text-blue-400 group cursor-default">
        <i class="fa-solid fa-star-of-life text-2xl md:text-3xl transition-transform"></i>
        <div>
          <h1 class="text-lg md:text-2xl font-black tracking-wider leading-none drop-shadow-sm">EMT-1</h1>
          <p class="text-[9px] md:text-xs text-slate-500 dark:text-slate-400 font-mono tracking-widest uppercase mt-0.5">Training System</p>
        </div>
      </div>

      <nav class="hidden md:flex gap-2 lg:gap-4 absolute left-1/2 transform -translate-x-1/2">
        <a href="#Home" :class="navClass('Home')"><i class="fa-solid fa-house mr-2"></i>首頁</a>
        <a href="#Courses" :class="navClass('Courses')"><i class="fa-solid fa-book-medical mr-2"></i>教材</a>
        <a href="#Quiz" :class="navClass('Quiz')"><i class="fa-solid fa-file-signature mr-2"></i>學科測驗</a>
        <a href="#Gcs" :class="navClass('Gcs')"><i class="fa-solid fa-brain mr-2"></i>GCS練習</a>
      </nav>

      <div class="flex items-center gap-3 md:gap-4 shrink-0">
        <button @click="toggleTheme" class="w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700 shadow-sm">
          <i class="fa-solid text-base md:text-lg" :class="isDark ? 'fa-sun text-yellow-400' : 'fa-moon text-slate-500'"></i>
        </button>

        <button v-if="!user" @click="login" class="px-4 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-bold transition-all duration-300 border flex items-center bg-medical-blue dark:bg-blue-600 text-white border-medical-blue dark:border-blue-600 shadow-lg hover:bg-blue-800 dark:hover:bg-blue-700 active:scale-95">
          <i class="fa-brands fa-google md:mr-2"></i> <span class="hidden md:inline">登入</span>
        </button>

        <div v-else class="flex items-center gap-2 md:gap-3 bg-white dark:bg-slate-800 p-1 md:px-2 md:py-1.5 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm transition-colors">
          <img :src="user.picture" class="w-7 h-7 md:w-8 md:h-8 rounded-full border border-medical-blue dark:border-blue-400">
          <span class="hidden md:block text-sm font-bold text-slate-700 dark:text-slate-200 truncate max-w-[120px]">{{ user.name }}</span>
          <button @click="logout" class="hidden md:block text-xs bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-3 py-1.5 rounded-full font-bold hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors mr-1">登出</button>
          
          <button @click="logout" class="md:hidden w-7 h-7 flex items-center justify-center bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-full active:scale-95"><i class="fa-solid fa-right-from-bracket text-[10px]"></i></button>
        </div>
      </div>
    </header>

    <main class="w-full flex-grow overflow-hidden flex flex-col relative md:pb-0">
      <transition name="fade-slide" mode="out-in">
        <component :is="currentView" :catalogs="catalogs" :route-param="routeParam" :user-history="userHistory" @update-history="handleHistoryUpdate" @show-toast="showToast"></component>
      </transition>
    </main>

    <footer class="text-center py-3 text-slate-400 dark:text-slate-500 text-xs md:text-sm mt-auto shrink-0 bg-transparent w-full z-50 font-medium tracking-wide mb-16 md:mb-0">
      <p><i class="fa-solid fa-heart-pulse text-medical-red dark:text-red-500 mr-1 animate-pulse"></i> &copy; 2026 Haimu. EMT-1 Training System.</p>
    </footer>

    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 z-[60] pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
      <div class="flex justify-around items-center h-[65px] px-1">
        <a href="#Home" :class="navClass('Home')" class="mobile-nav-item"><i class="fa-solid fa-house"></i><span>首頁</span></a>
        <a href="#Courses" :class="navClass('Courses')" class="mobile-nav-item"><i class="fa-solid fa-book-medical"></i><span>教材</span></a>
        <a href="#Quiz" :class="navClass('Quiz')" class="mobile-nav-item"><i class="fa-solid fa-file-signature"></i><span>測驗</span></a>
        <a href="#Gcs" :class="navClass('Gcs')" class="mobile-nav-item"><i class="fa-solid fa-brain"></i><span>GCS</span></a>
      </div>
    </nav>

  </div>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
