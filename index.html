<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMT-1 訓練平台</title>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="./assets/css/style.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { medical: { blue: '#1e3a8a', red: '#dc2626', light: '#f8fafc' } } } }
    }
  </script>
</head>

<body
  class="bg-medical-light dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans antialiased h-[100dvh] overflow-hidden flex flex-col transition-colors duration-300 relative">

  <div class="h-1.5 w-full bg-gradient-to-r from-medical-blue via-medical-light to-medical-red shrink-0 z-[70]"></div>

  <div id="app"
    class="max-w-[1400px] mx-auto px-3 md:px-8 pt-4 md:pt-6 pb-4 flex-grow w-full flex flex-col min-h-0 relative">

    <transition name="fade-slide">
      <div v-if="toast.visible"
        :class="['fixed top-24 md:top-28 left-1/2 transform -translate-x-1/2 z-[100] px-5 py-3 rounded-full shadow-2xl font-bold flex items-center gap-3 border transition-all duration-300', toast.type === 'error' ? 'bg-red-50 dark:bg-red-900/95 text-red-600 dark:text-red-300 border-red-200 dark:border-red-700' : 'bg-green-50 dark:bg-green-900/95 text-green-600 dark:text-green-300 border-green-200 dark:border-green-700']">
        <i :class="['fa-solid', toast.type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check', 'text-lg']"></i>
        <span class="text-sm md:text-base whitespace-nowrap">{{ toast.message }}</span>
      </div>
    </transition>

    <header
      class="shrink-0 bg-white/95 dark:bg-slate-800/95 backdrop-blur-md shadow-sm border border-slate-200 dark:border-slate-700 rounded-2xl md:rounded-3xl px-4 py-3 md:px-6 md:py-4 mb-4 md:mb-6 transition-colors flex flex-wrap md:flex-nowrap items-center justify-between gap-y-3 gap-x-4 z-50">

      <div class="flex items-center gap-2 md:gap-3 text-medical-blue dark:text-blue-400 shrink-0 order-1">
        <i class="fa-solid fa-star-of-life text-2xl md:text-3xl"></i>
        <div>
          <h1 class="text-lg md:text-2xl font-black tracking-wider leading-none">EMT-1</h1>
          <p class="text-[9px] md:text-xs text-slate-400 font-mono tracking-widest uppercase mt-0.5">Training System</p>
        </div>
      </div>

      <div class="flex items-center gap-2 md:gap-4 shrink-0 order-2 md:order-3 ml-auto md:ml-0">
        <button @click="toggleTheme"
          class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
          <i class="fa-solid text-sm md:text-lg"
            :class="isDark ? 'fa-sun text-yellow-400' : 'fa-moon text-slate-500'"></i>
        </button>

        <button v-if="!user" @click="login"
          class="px-3 py-1.5 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-bold transition-all duration-300 border flex items-center whitespace-nowrap bg-medical-blue dark:bg-blue-600 text-white border-medical-blue dark:border-blue-600 shadow-sm hover:bg-blue-800 dark:hover:bg-blue-700 active:scale-95">
          <i class="fa-brands fa-google mr-1.5 md:mr-2"></i> 登入
        </button>

        <div v-else
          class="flex items-center gap-2 md:gap-3 bg-slate-50 dark:bg-slate-700 px-2 py-1 md:px-3 md:py-1.5 rounded-full border border-slate-200 dark:border-slate-600 shadow-sm transition-colors">
          <img :src="user.picture"
            class="w-6 h-6 md:w-8 md:h-8 rounded-full border border-slate-300 dark:border-slate-500">
          <span
            class="text-xs md:text-sm font-bold text-slate-700 dark:text-slate-200 truncate max-w-[80px] md:max-w-[150px]">{{
            user.name }}</span>
          <button @click="logout"
            class="text-[10px] md:text-xs bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-2 py-1 md:px-3 md:py-1.5 rounded-lg font-bold hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors shrink-0">
            登出
          </button>
        </div>
      </div>

      <nav class="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-auto order-3 md:order-2 pb-1 md:pb-0">
        <a href="/Home" @click.prevent="navigate('Home')" :class="navClass('Home')"><i class="fa-solid fa-house mr-1 md:mr-2"></i>首頁</a>
        <a href="/Material" @click.prevent="navigate('Material')" :class="navClass('Material')"><i class="fa-solid fa-book-medical mr-1 md:mr-2"></i>教材</a>
        <a href="/Mcq" @click.prevent="navigate('Mcq')" :class="navClass('Mcq')"><i class="fa-solid fa-file-signature mr-1 md:mr-2"></i>學科測驗</a>
        <a href="/Gcs" @click.prevent="navigate('Gcs')" :class="navClass('Gcs')"><i class="fa-solid fa-brain mr-1 md:mr-2"></i>GCS練習</a>
      </nav>
    </header>

    <main class="relative flex-grow flex flex-col overflow-hidden min-h-0">
      <transition name="fade-slide" mode="out-in">
        <component :is="currentView" :catalogs="catalogs" :route-param="routeParam" :user-history="userHistory"
          @update-history="handleHistoryUpdate" @show-toast="showToast"></component>
      </transition>
    </main>
  </div>

  <footer
    class="text-center py-2 md:py-3 text-slate-400 text-xs md:text-sm mt-auto shrink-0 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-colors w-full z-50">
    <p>&copy; 2026 Haimu. All rights reserved.</p>
  </footer>
  <script type="module" src="./assets/js/main.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
</body>

</html>
