<div class="w-full h-full flex justify-center min-h-0 overflow-hidden relative">

    <div v-if="!currentFile" class="w-full h-full overflow-y-auto custom-scrollbar p-4 md:p-8 pb-12 print:hidden">
        
        <div class="w-full bg-gradient-to-br from-medical-blue to-blue-800 rounded-3xl shadow-xl p-8 md:p-12 mb-10 text-white relative overflow-hidden flex flex-col items-center text-center">
            <div class="relative z-10">
                <i class="fa-solid fa-book-medical text-5xl md:text-6xl mb-6 text-blue-200"></i>
                <h2 class="text-3xl md:text-4xl font-black mb-4 tracking-tight">EMT-1 緊急醫療救護教材</h2>
                <p class="text-blue-100/80 font-medium max-w-xl mx-auto">紮實的學理基礎是專業救護的基石，請依序完成各章節的閱讀。</p>
            </div>
            <i class="fa-solid fa-book text-8xl md:text-[12rem] opacity-10 absolute right-4 -bottom-10 transform -rotate-12 pointer-events-none"></i>
        </div>

        <div class="grid gap-6 md:gap-8 sm:grid-cols-2 lg:grid-cols-3 relative z-10 text-left">
            <button v-for="(mat, index) in catalogs.courses" :key="index" @click="openCourses(mat.file)"
                :class="['p-8 md:p-10 bg-white dark:bg-slate-800 rounded-3xl border-2 hover:shadow-xl transition-all transform hover:-translate-y-1 group flex flex-col justify-between h-full relative overflow-hidden', isRead(mat.file) ? 'border-emerald-500 bg-emerald-50/20 dark:bg-emerald-900/10' : 'border-slate-100 dark:border-slate-700 hover:border-medical-blue dark:hover:border-blue-500']">
                
                <div v-if="isRead(mat.file)" class="absolute top-0 right-0 text-white px-5 py-2.5 rounded-bl-3xl font-black text-sm shadow-sm tracking-wider bg-emerald-500">
                    <i class="fa-solid fa-check mr-1"></i>已完讀
                </div>
                
                <div>
                    <div :class="['w-16 h-16 rounded-full flex items-center justify-center transition-colors mb-6 shadow-sm border-2', isRead(mat.file) ? 'bg-emerald-100 dark:bg-emerald-900/50 border-emerald-400 text-emerald-600 dark:text-emerald-400' : 'bg-blue-50 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-medical-blue dark:text-blue-400 group-hover:bg-medical-blue group-hover:text-white group-hover:border-medical-blue']">
                        <span class="font-black text-2xl">{{ (index + 1).toString().padStart(2, '0') }}</span>
                    </div>
                    <span :class="['font-black text-xl md:text-2xl leading-snug transition-colors', isRead(mat.file) ? 'text-emerald-700 dark:text-emerald-400' : 'text-slate-800 dark:text-slate-100 group-hover:text-medical-blue dark:group-hover:text-blue-400']">{{ mat.title }}</span>
                </div>
                
                <div class="mt-10 flex justify-end">
                    <span :class="['text-sm md:text-base font-black px-6 py-3 rounded-full transition-colors shadow-sm flex items-center gap-2', isRead(mat.file) ? 'bg-emerald-500 text-white hover:bg-emerald-600' : 'text-slate-500 dark:text-slate-400 group-hover:text-white group-hover:bg-medical-blue bg-slate-100 dark:bg-slate-700']">
                        {{ isRead(mat.file) ? '再次閱讀' : '開始閱讀' }} <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </div>
            </button>
        </div>
    </div>

    <div v-else class="w-full h-full flex flex-col min-h-0 bg-[#FDFBF7] dark:bg-slate-900 overflow-hidden relative">
        <div class="shrink-0 bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center shadow-sm z-20 print:hidden">
            <button @click="goBack" class="group px-5 py-2.5 rounded-full text-sm md:text-base font-bold bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 flex items-center gap-2 transition-all shadow-sm">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> <span class="hidden md:block">返回目錄</span>
            </button>

            <div class="flex items-center gap-3 md:gap-5">
                <button onclick="window.print()" class="hidden md:flex w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 items-center justify-center transition-all shadow-sm" title="列印或儲存為 PDF">
                    <i class="fa-solid fa-print"></i>
                </button>
                <div class="bg-blue-50 dark:bg-blue-900/30 px-4 py-2 rounded-xl border border-blue-100 dark:border-blue-800 flex items-center gap-2 shadow-sm" title="閱讀進度">
                    <i class="fa-solid fa-book-open-reader text-medical-blue dark:text-blue-400"></i>
                    <span class="font-mono font-black text-medical-blue dark:text-blue-400">{{ Math.round(readProgress) }}%</span>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full h-1.5 bg-slate-100 dark:bg-slate-800">
                <div class="h-full bg-gradient-to-r from-medical-blue to-blue-400 transition-all duration-300 rounded-r-full" :style="{ width: readProgress + '%' }"></div>
            </div>
        </div>

        <div ref="markdownBody" @scroll="onMaterialScroll" class="flex-grow w-full overflow-y-auto overscroll-none scroll-smooth px-6 py-8 md:px-12 md:py-16 relative z-10 custom-scrollbar print:p-0 print:bg-white print:text-black">
            <div id="article-top"></div>
            <div class="prose prose-lg md:prose-xl dark:prose-invert max-w-5xl mx-auto leading-loose text-slate-800 dark:text-slate-300 selection:bg-blue-200 dark:selection:bg-blue-900">
                <h1 v-if="currentTitle" class="font-black text-transparent bg-clip-text bg-gradient-to-r from-medical-blue to-blue-600 dark:from-blue-400 dark:to-blue-200 text-4xl md:text-5xl mb-8 tracking-tight">{{ currentTitle }}</h1>
                
                <div class="flex flex-wrap gap-4 mb-12 pb-8 border-b-2 border-slate-100 dark:border-slate-700/50 print:hidden">
                    <span class="bg-blue-50 dark:bg-blue-900/30 text-medical-blue dark:text-blue-400 px-4 py-2 rounded-xl text-sm md:text-base font-bold tracking-widest border border-blue-200 dark:border-blue-800 shadow-sm"><i class="fa-solid fa-layer-group mr-2"></i>{{ currentModule }}</span>
                    <span class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-4 py-2 rounded-xl text-sm md:text-base font-bold tracking-widest border border-slate-200 dark:border-slate-700 shadow-sm"><i class="fa-solid fa-clock mr-2"></i>建議閱讀時間：{{ currentSuggestedTime }} 分鐘</span>
                </div>

                <div v-if="currentMarkdown" v-html="markdownHtml" class="break-words"></div>
            </div>

            <div class="max-w-5xl mx-auto mt-20 pt-10 border-t-2 border-slate-200 dark:border-slate-700/50 flex flex-wrap justify-between items-center gap-4 pb-12 print:hidden">
                <p class="text-base md:text-lg font-bold text-slate-400 tracking-wider"><i class="fa-solid fa-flag-checkered mr-2"></i>本章節結束</p>
                <div class="flex gap-4">
                    <button @click="goBack" class="px-8 py-3.5 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-base md:text-lg font-black transition-all transform active:scale-95 flex items-center gap-3 shadow-sm border border-slate-200 dark:border-slate-700">
                        <i class="fa-solid fa-check text-emerald-500"></i> 完成閱讀
                    </button>
                    <a href="#article-top" class="w-14 h-14 rounded-full bg-medical-blue text-white flex items-center justify-center hover:bg-blue-700 transition-all transform active:scale-95 shadow-md text-xl" title="回到頂部">
                        <i class="fa-solid fa-arrow-up"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
